name: Validate JSON

on:
  pull_request:
    paths:
      - 'packages.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate packages.json
        id: validate
        run: |
          if ! jq empty packages.json 2>/dev/null; then
            echo "status=failure" >> $GITHUB_OUTPUT
            {
              echo "message<<EOF"
              echo ":x: Syntax error: $(jq empty packages.json 2>&1)"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            exit 0
          fi

          # Errors (structure)
          errors=$(jq -r '
            . as $pkg | range(length) as $i | $pkg[$i] |
            if has("name") | not then "Package #\($i): missing name" else empty end,
            if has("sources") | not then "Package #\($i): missing sources" else empty end,
            ((.sources // []) | to_entries[] |
              if (.value | has("url") | not) then "Package #\($pkg[$i].name // $i): source #\(.key) missing url" else empty end
            )
          ' packages.json)

          # Warnings (method + artifacts)
          warnings=$(jq -r '
            . as $pkg | range(length) as $i | $pkg[$i] |
            ((.sources // []) | to_entries[] |
              if (.value | has("method") | not) then "Package #\($pkg[$i].name // $i): source #\(.key) missing method (optional)" else empty end,
              if (.value | has("artifacts")) then
                if (.value.artifacts | test("\\.(zip|tar\\.gz|tgz|tar\\.bz2|tbz|tar\\.xz|txz|7z|rar|exe|msi|dmg|pkg|deb|rpm|AppImage|snap|flatpak)([?#].*)?$"; "i")) then
                  "Package #\($pkg[$i].name // $i): artifacts appears to be a direct download link (should be a release page URL)"
                else empty end
              else empty end
            )
          ' packages.json)

          # Output final status
          if [ -n "$errors" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            {
              echo "message<<EOF"
              echo ":x: Structure errors:"
              echo "$errors"
              if [ -n "$warnings" ]; then
                echo ""
                echo ":warning: Warnings:"
                echo "$warnings"
              fi
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            if [ -n "$warnings" ]; then
              {
                echo "message<<EOF"
                echo ":white_check_mark: packages.json is valid"
                echo ""
                echo ":warning: Warnings:"
                echo "$warnings"
                echo "EOF"
              } >> $GITHUB_OUTPUT
            else
              {
                echo "message<<EOF"
                echo ":white_check_mark: packages.json is valid"
                echo "EOF"
              } >> $GITHUB_OUTPUT
            fi
          fi

      - name: Comment PR
        if: github.event.pull_request.head.repo.full_name == github.repository && always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## JSON Validation\n${{ steps.validate.outputs.message }}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('JSON Validation'));
            const method = existing ? 'updateComment' : 'createComment';
            const params = existing
              ? { ...context.repo, comment_id: existing.id, body }
              : { ...context.repo, issue_number: context.issue.number, body };
            await github.rest.issues[method](params);
            if ('${{ steps.validate.outputs.status }}' === 'failure') process.exit(1);