name: Update Metadata

on:
  push:
    branches:
      - master
    paths:
      - 'packages.json'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl tcl tcllib

      - name: Generate metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tcl script handles comparison logic and decides whether to
          # keep the old version or update to new version
          tclsh metadata/generate_meta.tcl

      - name: Commit and push if changed
        run: |
          # Check if there are actual changes to commit
          if git diff --quiet HEAD metadata/packages-meta.json; then
            echo "✓ No changes to commit"
            exit 0
          fi

          BACKUP_NAME="backup/metadata-$(date +%Y%m%d-%H%M%S)-${{ github.run_id }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Create a backup branch from the current state of the master branch
          git branch $BACKUP_NAME
          git push origin $BACKUP_NAME

          echo "✓ Backup created: $BACKUP_NAME"
          echo "backup_branch=$BACKUP_NAME" >> $GITHUB_OUTPUT

          # Extract version and date for commit message
          VERSION=$(jq -r '.[0].version' metadata/packages-meta.json)
          DATE=$(jq -r '.[0].generated_at' metadata/packages-meta.json | cut -d'T' -f1)

          git add metadata/packages-meta.json
          git commit -m "Update metadata v${VERSION} (${DATE})"
          git push